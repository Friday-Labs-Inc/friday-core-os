# Systemd hardening drop-in for every friday-core-os service.
#
# Applies to any service declared as `friday-core-os@<name>.service` — the
# instance template pattern. Concrete services (e.g. `module-registry.service`)
# also pick up these defaults by adding them to their own [Service] section
# or by using `Include=/etc/systemd/system/friday-core-os@.service.d/security.conf`.
#
# These are conservative defaults for services that need TCP/UDP + IPC and
# should NEVER need to elevate privileges, write outside their state dir, or
# execute code from writable memory. Individual services override where they
# genuinely need more (e.g. mosquitto needs CAP_NET_BIND_SERVICE for :1883).
#
# References:
#   * systemd.exec(5) — security section
#   * https://www.freedesktop.org/software/systemd/man/systemd.exec.html
#   * Ubuntu Server Security Guide (24.04)

[Service]
# --- process privileges ---
NoNewPrivileges=yes
CapabilityBoundingSet=

# --- filesystem ---
ProtectSystem=strict
ProtectHome=yes
PrivateTmp=yes
ReadWritePaths=/var/lib/friday /var/log/friday

# --- kernel + control interfaces ---
ProtectKernelTunables=yes
ProtectKernelModules=yes
ProtectKernelLogs=yes
ProtectControlGroups=yes
ProtectClock=yes
ProtectHostname=yes
ProtectProc=invisible

# --- namespaces ---
RestrictNamespaces=yes
LockPersonality=yes

# --- memory + exec ---
MemoryDenyWriteExecute=yes
RestrictRealtime=yes
RestrictSUIDSGID=yes
RemoveIPC=yes

# --- networking ---
RestrictAddressFamilies=AF_UNIX AF_INET AF_INET6 AF_NETLINK
IPAddressDeny=any
IPAddressAllow=localhost 10.0.1.0/24 100.64.0.0/10
# 100.64.0.0/10 = the Tailscale/WireGuard CGNAT range for FCC comms

# --- syscall filtering ---
SystemCallFilter=@system-service
SystemCallFilter=~@debug @mount @privileged @raw-io @reboot @swap @cpu-emulation @obsolete
SystemCallArchitectures=native

# --- resource limits (defensive; individual services override) ---
LimitNOFILE=4096
LimitNPROC=1024

# --- restart policy ---
Restart=on-failure
RestartSec=3s
StartLimitBurst=5
StartLimitIntervalSec=60
