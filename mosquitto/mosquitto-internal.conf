# Internal MQTT broker — Core Hub ↔ Telemetry Gateway bridge
#
# Listens ONLY on the Ethernet interface (eth0) connecting to the
# Telemetry Gateway Pi 3B+. Not exposed to Wi-Fi or USB networks.
#
# Wire format: Ed25519-signed CBOR envelopes (same format as the
# Command Center external link). The Telemetry Gateway relays these
# to/from the external EMQX broker without modification.

# Bind to the internal Ethernet interface only
listener 1883 10.0.1.1
protocol mqtt

# No auth on the internal bridge — both ends are trusted (same rover)
allow_anonymous true

# Persistence for offline buffering (Telemetry Gateway temporarily down)
persistence true
persistence_location /var/lib/mosquitto/

# Logging
log_dest syslog
log_type error
log_type warning
